policy_id: "finance-budget-reallocation-v1"
mutation_type: "budget_reallocation"

description: >
  Domain-level policy for a budget reallocation scenario. This policy is consumed by the demo
  runner to determine required roles and structural constraints for CRI-CORE enforcement.
  CRI-CORE does not interpret this policy; it only enforces the run_context it receives.

thresholds:
  - name: "standard"
    when:
      amount_lte_usd: 500000
    require:
      required_roles:
        - "responsible"
        - "accountable"
    notes: >
      Standard reallocation threshold. Requires Responsible + Accountable.

  - name: "elevated"
    when:
      amount_gt_usd: 500000
    require:
      required_roles:
        - "responsible"
        - "accountable"
        - "consulted"
    notes: >
      Elevated threshold. Adds Consulted as a required role.

role_constraints:
  separation_of_duties: true
  rule: >
    No single identity (id,type) may satisfy more than one role in required_roles.

conflict_of_interest:
  enforce_conflict_flags: true
  rule: >
    If run_context.identities.conflict_flags marks any required-role actor_id true, fail independence.

publication_requirements:
  require_publication_stage: true
  require_commit_gate: true